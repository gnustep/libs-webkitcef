<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>GNUstep CEF WebKit Demo</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: Georgia, "Times New Roman", serif;
      background: #f4f1e8;
      color: #1d2a2e;
    }

    main {
      box-sizing: border-box;
      min-height: 100%;
      padding: 56px 64px;
      background: linear-gradient(135deg, #f4f1e8 0%, #d7e7df 52%, #f0d8b8 100%);
    }

    h1 {
      font-size: 46px;
      margin: 0 0 18px 0;
      font-weight: 700;
    }

    p {
      font-size: 20px;
      line-height: 1.45;
      max-width: 760px;
    }

    a {
      color: #075b63;
      font-weight: 700;
    }

    .badge {
      display: inline-block;
      margin-bottom: 26px;
      padding: 8px 12px;
      border: 1px solid #1d2a2e;
    }
  </style>
</head>
<body>
  <main>
    <div class="badge">CEF rendered inside a GNUstep WebView</div>
    <h1>GNUstep WebKit CEF demo</h1>
    <p>This bundled page is loaded at startup to demonstrate that the embedded browser view is visible and rendering HTML.</p>
    <p><a href="https://example.com">Open example.com</a></p>
  </main>
</body>
</html>
